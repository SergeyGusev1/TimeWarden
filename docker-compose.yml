version: '3.8'

services:
  # База данных (опционально, если хочешь PostgreSQL)
  # postgres:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: timewarden
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

  # Бэкенд (FastAPI)
  backend:
    build: ./backend
    container_name: timewarden-backend
    volumes:
      - ./backend:/app
      - ./data:/app/data  # для SQLite
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/timewarden.db
      - APP_NAME=TimeWarden
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    # depends_on:
    #   - postgres
    restart: unless-stopped

  # Фронтенд (React)
  frontend:
    build: ./frontend
    container_name: timewarden-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Агент (нужен отдельный образ)
  agent:
    build: ./agent
    container_name: timewarden-agent
    volumes:
      - ./agent:/app
    environment:
      - SERVER_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    # Для Windows нужно особое конфигурирование
    # stdin_open: true
    # tty: true

volumes:
  postgres_data: